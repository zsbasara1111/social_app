name: social_app
description: A social app with hobby-based matching system

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Backend
  supabase_flutter: ^2.3.4

  # Routing
  go_router: ^13.0.1

  # UI
  flutter_screenutil: ^5.9.0
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1
  flutter_card_swiper: ^6.0.0
  image_picker: ^1.0.7
  flutter_slidable: ^3.0.1
  shimmer: ^3.0.0

  # Utilities
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  equatable: ^2.0.5
  logger: ^2.0.2+1
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  timeago: ^3.6.0
  shared_preferences: ^2.2.2

  # Permissions
  permission_handler: ^11.0.0

  # Location
  geolocator: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  custom_lint: ^0.5.7
  riverpod_lint: ^2.3.7

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/

  # fonts:
  #   - family: NotoSansSC
  #     fonts:
  #       - asset: fonts/NotoSansSC-Regular.otf
  #       - asset: fonts/NotoSansSC-Bold.otf
  #         weight: 700
